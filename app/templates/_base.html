<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}htmx-chat{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.min.css">
  <script src="/static/css/daisyui.js"></script>
  <style>
    .md-content > :first-child { margin-top: 0; }
    .md-content > :last-child { margin-bottom: 0; }
    .md-content h1,.md-content h2,.md-content h3,.md-content h4 { font-weight:700; margin:.6em 0 .2em; line-height:1.3; }
    .md-content h1 { font-size:1.4em; }
    .md-content h2 { font-size:1.2em; }
    .md-content h3 { font-size:1.05em; }
    .md-content p { margin:.4em 0; }
    .md-content ul { list-style:disc outside; padding-left:1.4em; margin:.4em 0; }
    .md-content ol { list-style:decimal outside; padding-left:1.4em; margin:.4em 0; }
    .md-content li { margin:.15em 0; }
    .md-content strong { font-weight:700; }
    .md-content em { font-style:italic; }
    .md-content code { font-family:ui-monospace,monospace; font-size:.875em; background:rgba(128,128,128,.15); border-radius:.25em; padding:.1em .35em; }
    .md-content pre { background:rgba(128,128,128,.15); border-radius:.5em; padding:.75em 1em; overflow-x:auto; margin:.5em 0; }
    .md-content pre code { background:none; padding:0; font-size:.85em; }
    .md-content blockquote { border-left:3px solid rgba(128,128,128,.4); padding-left:.75em; margin:.4em 0; opacity:.85; }
    .md-content a { text-decoration:underline; opacity:.85; }
    .md-content a:hover { opacity:1; }
    .md-content hr { border:none; border-top:1px solid rgba(128,128,128,.3); margin:.75em 0; }
    .md-content table { border-collapse:collapse; width:100%; margin:.5em 0; font-size:.9em; }
    .md-content th,.md-content td { border:1px solid rgba(128,128,128,.3); padding:.3em .6em; text-align:left; }
    .md-content th { font-weight:700; background:rgba(128,128,128,.1); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js" defer></script>
  <script src="/static/vendor/alpinemin.js" defer></script>
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/js/chat.js" defer></script>
  {% block scripts %}{% endblock %}
</head>
<body class="bg-base-100 text-base-content">
  {% block body %}{% endblock %}
</body>
</html>
